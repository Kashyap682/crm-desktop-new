<div class="layout-container" [class.collapsed]="sidebarCollapsed">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-brand">CRM</span>
      <button class="sidebar-toggle" (click)="sidebarCollapsed = !sidebarCollapsed"
        [title]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L6 8l4 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">

      <a routerLink="/dashboard" routerLinkActive="active" title="Dashboard">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 6.5L8 2l6 4.5V14a1 1 0 01-1 1H3a1 1 0 01-1-1V6.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M6 15V9h4v6" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="nav-text">Dashboard</span>
      </a>

      <a routerLink="/customers" routerLinkActive="active" title="Customers">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 14c0-3 2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M11 3a2.5 2.5 0 010 4M15 14c0-2.5-1.5-4.5-4-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-text">Customers</span>
      </a>

      <a routerLink="/vendor" routerLinkActive="active" title="Vendors">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="6" width="14" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 6l7-5 7 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="6" y="10" width="4" height="5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="nav-text">Vendors</span>
      </a>

      <a routerLink="/items" routerLinkActive="active" title="Inquiry">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14 9.5a1 1 0 01-1 1H4l-3 3V2a1 1 0 011-1h11a1 1 0 011 1v7.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="nav-text">Inquiry</span>
      </a>

      <a routerLink="/offers" routerLinkActive="active" title="Offers">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M9 1h5v5L8 12 4 8l5-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="11.5" cy="4.5" r="1" fill="currentColor"/>
        </svg>
        <span class="nav-text">Offers</span>
      </a>

      <a routerLink="/sales-order" routerLinkActive="active" title="Sales Order">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1 1.5h2.5l2 8h7l2-6H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="7" cy="13" r="1.5" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="12" cy="13" r="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="nav-text">Sales Order</span>
      </a>

      <a routerLink="/purchase-order" routerLinkActive="active" title="Purchase Order">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M14 5.5L8 2 2 5.5V11l6 3 6-3V5.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M2 5.5l6 3 6-3M8 8.5V14" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="nav-text">Purchase Order</span>
      </a>

      <a routerLink="/rfq" routerLinkActive="active" title="RFQ">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 1H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V5l-4-4z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1v4h4M5 9h6M5 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-text">RFQ</span>
      </a>

      <a routerLink="/proforma-invoice" routerLinkActive="active" title="Proforma Invoice">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 1H3a1 1 0 00-1 1v12a1 1 0 001 1h10a1 1 0 001-1V5l-4-4z" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1v4h4M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="nav-text">Proforma Invoice</span>
      </a>

      <a routerLink="/invoices" routerLinkActive="active" title="Invoices">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 1h10v14l-2-1.5-2 1.5-2-1.5-2 1.5L3 15V1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M6 6h4M6 9h4M6 12h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-text">Invoices</span>
      </a>

      <a routerLink="/payments" routerLinkActive="active" title="Payments">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M1 7h14" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="10" width="3" height="1.5" rx="0.5" fill="currentColor"/>
        </svg>
        <span class="nav-text">Payments</span>
      </a>

      <a routerLink="/reminders" routerLinkActive="active" title="Reminders">
        <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1a5 5 0 00-5 5v3.5l-1 1.5h12l-1-1.5V6a5 5 0 00-5-5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6.5 13.5a1.5 1.5 0 003 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="nav-text">Reminders</span>
      </a>

    </nav>
  </aside>

  <!-- Top bar + content -->
  <div class="main-wrapper">
    <header class="top-navbar">
      <div class="navbar-center">NAVBHARAT</div>
      <div class="navbar-right">
        <a routerLink="/inventory" class="inventory-link" title="Inventory">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="4" width="14" height="3" rx="1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 7v9h12V7M7 11h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Inventory</span>
        </a>
      </div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
